<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>body { margin: 0; padding: 0; }</style>
</head>
<body>
  <script>
    localStorage.removeItem('bp/messaging/session');
    localStorage.clear();
  </script>
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js?v=2"></script>
  <script src="https://files.bpcontent.cloud/2026/04/08/14/20260408140732-OE8X8DYX.js?v=2"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const name = decodeURIComponent(params.get('name') || '');
    const email = decodeURIComponent(params.get('email') || '');

    if (name || email) {
      window.botpress.on('webchat:initialized', async () => {
        await window.botpress.updateUser({ data: { firstName: name, email: email } });
        // Restart conversation so the bot picks up the new user data
        await window.botpress.sendEvent({ type: 'trigger', channel: 'web' });
      });
    }
  </script>
</body>
</html>
