<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>body { margin: 0; padding: 0; }</style>
</head>
<body>
  <script>
    // Clear bot history on every load
    localStorage.removeItem('bp/messaging/session');
    localStorage.clear();
  </script>
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js?v=2"></script>
  <script src="https://files.bpcontent.cloud/2026/04/08/14/20260408140732-OE8X8DYX.js?v=2"></script>
  <script>
    // Listen for user identity from SharePoint parent page
    window.addEventListener('message', (event) => {
      if (event.data?.type === 'BP_USER') {
        const { name, email } = event.data.user;

        window.botpress.on('webchat:initialized', () => {
          window.botpress.updateUser({
            data: {
              firstName: name,
              email: email
            }
          });
        });
      }
    });

    // Tell the parent page we're ready to receive user data
    window.addEventListener('load', () => {
      window.parent.postMessage({ type: 'BP_READY' }, '*');
    });
  </script>
</body>
</html>
